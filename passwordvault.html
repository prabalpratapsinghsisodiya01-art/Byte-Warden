<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte Warden - Password Vault</title>
    <link rel="stylesheet" href="passwordvault.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="prabal.html" class="back-link">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
    </a>

    <!-- Initial Setup & Login View -->
    <div id="auth-view" class="vault-container">
        <div class="auth-box">
            <div class="vault-header">
                <svg viewBox="0 0 24 24" width="48" height="48" stroke="#4da6ff" stroke-width="2" fill="none" class="auth-icon">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h2>Byte Warden Vault</h2>
                <p id="auth-description">Enter your Master Password to unlock your secure vault.</p>
            </div>
            <div class="auth-form">
                <div class="input-group">
                    <label for="master-password">Master Password</label>
                    <input type="password" id="master-password" placeholder="Enter password...">
                </div>
                <div class="input-group" id="confirm-group" style="display: none;">
                    <label for="confirm-master">Confirm Master Password</label>
                    <input type="password" id="confirm-master" placeholder="Re-enter password...">
                </div>
                <button id="auth-btn" class="primary-btn">Unlock Vault</button>
            </div>
             <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <!-- Main Vault View (Hidden initially) -->
    <div id="dashboard-view" class="vault-container" style="display: none;">
        <div class="dashboard-header">
            <div class="header-left">
                <h2>My Secure Vault</h2>
            </div>
            <div class="header-right">
                <button id="add-new-btn" class="primary-btn">+ Add Password</button>
                <button id="lock-btn" class="secondary-btn">Lock</button>
            </div>
        </div>

        <div class="vault-list-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search saved passwords...">
            </div>
            <ul id="password-list" class="password-list">
                <!-- Vault items injected via JS -->
            </ul>
        </div>
    </div>

    <!-- Modal for adding/editing password -->
    <div id="entry-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Password</h3>
                <button id="close-modal" class="icon-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>App/Website Name</label>
                    <input type="text" id="entry-title" placeholder="e.g. Gmail">
                </div>
                <div class="input-group">
                    <label>Username / Email</label>
                    <input type="text" id="entry-username" placeholder="user@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-input-wrap">
                        <input type="password" id="entry-password" placeholder="Secret password">
                        <button type="button" id="toggle-vis-btn" class="icon-btn tooltip" aria-label="Toggle Visibility">
                           👁️
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <p id="modal-error" class="error-msg"></p>
                <button id="save-entry-btn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="passwordvault.js"></script>
</body>
</html>
